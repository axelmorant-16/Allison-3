<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti</title>
<style>
  :root{
    --bg: #12141c;
    --bg-soft: #1a1d29;
    --cream: #f2e9d8;
    --cream-dim: #cfc4ac;
    --gold: #d4a24c;
    --line: rgba(242,233,216,0.12);
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }

  body{
    margin:0;
    background: radial-gradient(ellipse at top, #1c2030 0%, var(--bg) 55%);
    color:var(--cream);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height:100vh;
  }

  @media (prefers-reduced-motion: no-preference){
    .vinyl{ animation: spin 9s linear infinite; }
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .wrap{
    max-width:480px;
    margin:0 auto;
    padding: 48px 20px 80px;
  }

  header{ text-align:center; margin-bottom:52px; }

  .vinyl-holder{ width:72px; height:72px; margin:0 auto 20px; }
  .vinyl circle:first-child{ fill:#0b0c11; }
  .vinyl circle:nth-child(2){ fill:var(--bg-soft); }
  .vinyl circle:last-child{ fill:var(--gold); }

  .eyebrow{
    font-size:11px;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 14px;
  }

  h1{
    font-family: Georgia, 'Iowan Old Style', serif;
    font-style:italic;
    font-weight:400;
    font-size:clamp(24px, 7vw, 34px);
    line-height:1.3;
    margin:0;
    color:var(--cream);
  }

  .subtitle{
    color:var(--cream-dim);
    font-size:14px;
    margin-top:16px;
    line-height:1.6;
  }

  section{ margin-bottom:48px; }
  section:last-of-type{ margin-bottom:0; }

  .section-label{
    display:flex;
    align-items:baseline;
    gap:10px;
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 18px;
  }
  .section-label .idx{ color:var(--cream-dim); font-variant-numeric: tabular-nums; }

  .item{ margin-bottom:14px; }
  .item:last-child{ margin-bottom:0; }

  .track-frame{
    border-radius:12px;
    overflow:hidden;
    border:1px solid var(--line);
    background:var(--bg-soft);
  }

  .native-video-frame{
    border-radius:12px;
    overflow:hidden;
    border:1px solid var(--line);
    background:#000;
    margin-bottom:10px;
    line-height:0;
  }
  .native-video-frame video{
    display:block;
    width:100%;
    max-height:70vh;
  }

  .link-row{
    display:flex;
    justify-content:flex-end;
    gap:16px;
    font-size:12px;
    margin:6px 2px 0;
  }
  .link-row a{
    color:var(--gold);
    text-decoration:none;
  }
  .link-row a:hover{ text-decoration:underline; }

  .video-caption{
    font-size:13px;
    color:var(--cream-dim);
    margin: 8px 2px 0;
    line-height:1.5;
  }

  .bonus-tag{
    display:inline-block;
    font-size:10px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--bg);
    background:var(--gold);
    padding:3px 8px;
    border-radius:20px;
    margin-bottom:12px;
  }

  .photo-frame{
    border-radius:12px;
    overflow:hidden;
    border:1px solid var(--line);
    background:var(--bg-soft);
    margin-bottom:10px;
  }
  .photo-frame img{
    display:block;
    width:100%;
    height:auto;
  }
  .photo-caption{
    font-size:13px;
    color:var(--cream-dim);
    margin: 8px 2px 0;
    line-height:1.5;
  }

  footer{
    text-align:center;
    color:var(--cream-dim);
    font-size:12px;
    letter-spacing:0.05em;
    margin-top:64px;
    opacity:0.65;
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="vinyl-holder">
      <svg class="vinyl" viewBox="0 0 100 100" width="72" height="72">
        <circle cx="50" cy="50" r="48"/>
        <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(242,233,216,0.06)" stroke-width="1"/>
        <circle cx="50" cy="50" r="22" fill="none" stroke="rgba(242,233,216,0.06)" stroke-width="1"/>
        <circle cx="50" cy="50" r="6"/>
      </svg>
    </div>

    <!-- EDITA ESTE TÍTULO Y SUBTÍTULO -->
    <p class="eyebrow">Una selección para ti</p>
    <h1>Cosas que me hicieron<br>pensar en ti</h1>
    <p class="subtitle">Con cariño.</p>
  </header>

  <!-- ======================================================= -->
  <!-- 01 — CANCIÓN PRINCIPAL (Luna)                             -->
  <!-- ======================================================= -->
  <section>
    <p class="section-label"><span class="idx">01</span> Escucha esto primero</p>
    <div class="item">
      <div class="track-frame">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/7b3k8I1fncAzbk9PHnLkbX?utm_source=generator&theme=0"
          width="100%" height="352" frameBorder="0" allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
        </iframe>
      </div>
      <div class="link-row">
        <a href="https://open.spotify.com/track/7b3k8I1fncAzbk9PHnLkbX" target="_blank">Escuchar completa ↗</a>
        <a href="https://youtu.be/6W4L2O-JQ-w" target="_blank">Ver video oficial ↗</a>
      </div>
    </div>
  </section>

  <!-- ======================================================= -->
  <!-- 02 — MOMENTO 1                                            -->
  <!-- ======================================================= -->
  <section>
    <p class="section-label"><span class="idx">02</span> Un momento</p>
    <div class="item">
      <div class="photo-frame">
        <img src="momento-1.jpg" alt="Momento 1">
      </div>
      <p class="photo-caption"><!-- línea corta sobre esta foto --></p>
    </div>
  </section>

  <!-- ======================================================= -->
  <!-- 03 — EL VIDEO (reel, archivo local)                       -->
  <!-- El archivo reel.mp4 debe subirse junto al index.html      -->
  <!-- en el mismo repositorio de GitHub.                         -->
  <!-- ======================================================= -->
  <section>
    <p class="section-label"><span class="idx">03</span> El video</p>
    <div class="item">
      <div class="native-video-frame">
        <video controls playsinline preload="metadata">
          <source src="reel.mp4" type="video/mp4">
        </video>
      </div>
      <p class="video-caption"><!-- línea corta sobre por qué elegiste este --></p>
    </div>
  </section>

  <!-- ======================================================= -->
  <!-- 04 — MOMENTO 2                                            -->
  <!-- ======================================================= -->
  <section>
    <p class="section-label"><span class="idx">04</span> Otro momento</p>
    <div class="item">
      <div class="photo-frame">
        <img src="momento-2.jpg" alt="Momento 2">
      </div>
      <p class="photo-caption"><!-- línea corta sobre esta foto --></p>
    </div>
  </section>

  <!-- ======================================================= -->
  <!-- BONUS: Ma meilleure                                       -->
  <!-- ======================================================= -->
  <section>
    <span class="bonus-tag">Bonus</span>
    <div class="item">
      <div class="track-frame">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/4lriIG2vNqwDWzOj2I9rtj?utm_source=generator&theme=0"
          width="100%" height="352" frameBorder="0" allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
        </iframe>
      </div>
      <div class="link-row">
        <a href="https://open.spotify.com/track/4lriIG2vNqwDWzOj2I9rtj" target="_blank">Escuchar completa ↗</a>
        <a href="https://youtu.be/j-RpvIuazmc" target="_blank">Ver video oficial ↗</a>
      </div>
    </div>
  </section>

  <footer>hecho con calma, para ti</footer>

</div>

</body>
</html>
